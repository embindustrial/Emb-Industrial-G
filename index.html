<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMB Industrial Group</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Banner principal */
        .banner {
            width: 100%;
        }

        .banner img {
            width: 100%;
            height: auto;
        }

        /* Galería de productos */
        .productos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .productos img {
            width: 30%;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Botón de WhatsApp */
        .whatsapp {
            margin: 30px 0;
        }

        .whatsapp a {
            background-color: #25D366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
        }

        .whatsapp a:hover {
            background-color: #1ebe5d;
        }

        /* Sección de contacto */
        .contacto {
            margin: 30px;
        }
    </style>
</head>
<body>

    <!-- Banner principal -->
    <div class="banner">
        <img src="images/banner.jpg" alt="Banner EMB Industrial Group">
    </div>

    <!-- Galería de productos -->
    <div class="productos">
        <img src="images/producto1.jpg" alt="Producto 1">
        <img src="images/producto2.jpg" alt="Producto 2">
        <img src="images/producto3.jpg" alt="Producto 3">
    </div>

    <!-- Botón de WhatsApp -->
    <div class="whatsapp">
        <a href="https://wa.me/593995182911" target="_blank">Contáctanos por WhatsApp</a>
    </div>

    <!-- Sección de contacto -->
    <div class="contacto">
        <h2>Contáctanos</h2>
        <p>Paúl Murillo - Director Comercial</p>
        <p>Email: <a href="mailto:ventas@embindustrial.com">ventas@embindustrial.com</a></p>
        <p>Teléfono: +593 995182911</p>
        <p>Sitio web: <a href="https://www.embindustrial.com" target="_blank">www.embindustrial.com</a></p>
    </div>

</body>
</html>
